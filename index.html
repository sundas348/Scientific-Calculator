<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcite — Glassmorphism Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>
  <div class="orb orb-c" aria-hidden="true"></div>

  <!-- ── APP SHELL ── -->
  <div class="app-shell">

    <!-- ── HEADER ── -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Calcite</span>
      </div>
      <div class="header-right">
        <span class="keyboard-hint" id="kbHint">⌨ Keyboard ready</span>
        <button class="icon-btn" id="historyToggle" aria-label="Toggle history" title="History">
          <!-- clock icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Dark mode">
          <span class="sun">☀️</span><span class="moon">🌙</span>
        </button>
      </div>
    </header>

    <!-- ── MAIN AREA ── -->
    <main class="main-area">

      <!-- ══ CALCULATOR CARD ══ -->
      <section class="calc-card" aria-label="Calculator">

        <!-- Display -->
        <div class="display-wrap">
          <div class="display-expr" id="displayExpr" aria-live="polite" aria-label="Expression">0</div>
          <div class="display-result" id="displayResult" aria-live="polite" aria-label="Result"></div>
          <div class="display-mode" id="displayMode">DEG</div>
        </div>

        <!-- ── SCIENTIFIC PANEL (collapsible) ── -->
        <div class="sci-toggle-row">
          <button class="sci-toggle-btn" id="sciToggle" aria-expanded="false" aria-controls="sciPanel">
            Scientific
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="mode-btn" id="degRadToggle" title="Switch DEG / RAD">DEG</button>
        </div>

        <div class="sci-panel" id="sciPanel" aria-hidden="true">
          <div class="btn-grid sci-grid">
            <button class="btn sci" data-action="sin">sin</button>
            <button class="btn sci" data-action="cos">cos</button>
            <button class="btn sci" data-action="tan">tan</button>
            <button class="btn sci" data-action="log">log</button>
            <button class="btn sci" data-action="ln">ln</button>
            <button class="btn sci" data-action="sqrt">√</button>
            <button class="btn sci" data-action="square">x²</button>
            <button class="btn sci" data-action="cube">x³</button>
            <button class="btn sci" data-action="pow">xʸ</button>
            <button class="btn sci" data-action="inv">1/x</button>
            <button class="btn sci" data-action="pi">π</button>
            <button class="btn sci" data-action="e">e</button>
            <button class="btn sci" data-action="fact">n!</button>
            <button class="btn sci" data-action="abs">|x|</button>
            <button class="btn sci" data-action="percent">%</button>
          </div>
        </div>

        <!-- ── MAIN PAD ── -->
        <div class="btn-grid main-grid">
          <!-- Row 1: clear / sign / backspace / divide -->
          <button class="btn util" data-action="clear">AC</button>
          <button class="btn util" data-action="sign">+/−</button>
          <button class="btn util" data-action="backspace">⌫</button>
          <button class="btn op"   data-action="op" data-val="÷">÷</button>

          <!-- Row 2: 7 8 9 × -->
          <button class="btn num" data-action="digit" data-val="7">7</button>
          <button class="btn num" data-action="digit" data-val="8">8</button>
          <button class="btn num" data-action="digit" data-val="9">9</button>
          <button class="btn op"  data-action="op"    data-val="×">×</button>

          <!-- Row 3: 4 5 6 − -->
          <button class="btn num" data-action="digit" data-val="4">4</button>
          <button class="btn num" data-action="digit" data-val="5">5</button>
          <button class="btn num" data-action="digit" data-val="6">6</button>
          <button class="btn op"  data-action="op"    data-val="−">−</button>

          <!-- Row 4: 1 2 3 + -->
          <button class="btn num" data-action="digit" data-val="1">1</button>
          <button class="btn num" data-action="digit" data-val="2">2</button>
          <button class="btn num" data-action="digit" data-val="3">3</button>
          <button class="btn op"  data-action="op"    data-val="+">+</button>

          <!-- Row 5: 0 . = -->
          <button class="btn num wide" data-action="digit" data-val="0">0</button>
          <button class="btn num"      data-action="decimal">.</button>
          <button class="btn equals"   data-action="equals">=</button>
        </div>

      </section><!-- /calc-card -->

      <!-- ══ HISTORY PANEL ══ -->
      <aside class="history-panel" id="historyPanel" aria-label="Calculation history" aria-hidden="true">
        <div class="history-header">
          <span>History</span>
          <button class="clear-history-btn" id="clearHistory" aria-label="Clear history">Clear all</button>
        </div>
        <ul class="history-list" id="historyList" role="list">
          <!-- items injected by JS -->
        </ul>
        <p class="history-empty" id="historyEmpty">No history yet</p>
      </aside>

    </main><!-- /main-area -->

    <!-- Footer hint -->
    <footer class="app-footer">
      Built for <strong>CodeAlpha</strong> Frontend Internship &nbsp;·&nbsp; Task 2 — Calculator
    </footer>

  </div><!-- /app-shell -->

  <script src="script.js"></script>
</body>
</html>
